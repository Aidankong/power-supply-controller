name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'manual' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable with PyInstaller spec
        run: |
          pyinstaller --clean PowerSupplyController.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerSupplyController-Windows-${{ env.RELEASE_TAG }}
          path: dist/**
          if-no-files-found: error
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'manual' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable with PyInstaller spec
        run: |
          pyinstaller --clean PowerSupplyController.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerSupplyController-Linux-${{ env.RELEASE_TAG }}
          path: dist/**
          if-no-files-found: error
          retention-days: 30
